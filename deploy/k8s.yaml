apiVersion: apps/v1
kind: Deployment
metadata: { name: personagraph, labels: { app: personagraph } }
spec:
  replicas: 1
  selector: { matchLabels: { app: personagraph } }
  template:
    metadata: { labels: { app: personagraph } }
    spec:
      containers:
        - name: personagraph
          image: ghcr.io/cognis-digital/personagraph:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: personagraph }
spec:
  selector: { app: personagraph }
  ports: [{ port: 80, targetPort: 8000 }]
